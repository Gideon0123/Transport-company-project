spring.application.name=transport
server.port=8081

jwt.secret=${JWT_SECRET}


#MYSQL CONFIGURATIONS

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#spring.jpa.defer-datasource-initialization=true


#GOOGLE SMTP CONFIGURATIONS

spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.port=465

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.debug=true

spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.timeout=15000


#BREVO SMTP

#spring.mail.host=smtp-relay.brevo.com
##spring.mail.port=587
#spring.mail.port=465

#spring.mail.username=${BREVO_USERNAME}
#spring.mail.password=${BREVO_PASSWORD}

#spring.mail.properties.mail.debug=true


#GOOGLE OAUTH2 CONFIGURATION

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=profile,email


#CACHING CONFIG

spring.data.redis.host=${REDIS_USERNAME}
spring.data.redis.port=6379

logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis.cache=TRACE


#logging.level.org.springframework.boot.autoconfigure=DEBUG
